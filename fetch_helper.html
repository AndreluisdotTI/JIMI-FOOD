function fetchB64(url) {
  return fetch(url)
    .then(function(r) { return r.blob(); })
    .then(function(blob) {
      return new Promise(function(res) {
        var r = new FileReader();
        r.onload = function() { res(r.result); };
        r.readAsDataURL(blob);
      });
    });
}

Promise.all(files.map(function(f) { return fetchB64(BASE + f + T); }))
  .then(function(results) {
    window.__allB64 = results;
    localStorage.setItem('imgb64count', results.length);
    // store each separately to avoid localStorage size limits per key
    results.forEach(function(b64, i) {
      localStorage.setItem('imgb64_' + i, b64);
    });
    document.getElementById('status').textContent = 'ALL DONE';
    document.getElementById('count').textContent = 'Count: ' + results.length;
  })
  .catch(function(e) {
    document.getElementById('status').textContent = 'ERROR: ' + e.message;
  });
</script>
