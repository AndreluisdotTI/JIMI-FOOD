<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1200px;height:750px;background:#fff;display:flex;align-items:center;justify-content:center;}
#img{max-width:1200px;max-height:750px;display:block;}
</style>
</head>
<body>
<img id="img" src="" crossorigin="anonymous"/>
<script>
window.setImg = function(url){
  return new Promise(function(resolve){
    var img = document.getElementById('img');
    img.onload = function(){ resolve(); };
    img.onerror = function(){ resolve(); };
    img.src = url;
  });
};
</script>
</body>
</html>
